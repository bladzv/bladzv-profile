name: Build & Audit

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  lighthouse:
    needs: build
    runs-on: ubuntu-latest
    # Job-level `if` removed — evaluate presence at step level so env/vars/secrets are available.
    steps:
      - uses: actions/checkout@v4
      - name: Set LIGHTHOUSE_URL environment variable
        # Resolve repo variable, secret, or workflow env into the runner env safely.
        run: |
          echo "LIGHTHOUSE_URL=${{ vars.LIGHTHOUSE_URL || secrets.LIGHTHOUSE_URL || env.LIGHTHOUSE_URL }}" >> $GITHUB_ENV

      - name: Run Lighthouse Action
        # Use runner env check to avoid referencing secrets/vars directly in the `if` expression.
        if: ${{ env.LIGHTHOUSE_URL }}
        uses: GoogleChrome/lighthouse-action@v3
        with:
          url: ${{ env.LIGHTHOUSE_URL || 'https://example.com' }}
          output: html
          output-path: ./lh-report.html
