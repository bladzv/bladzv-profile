name: Build & Audit

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  lighthouse:
    needs: build
    runs-on: ubuntu-latest
    # Job-level `if` removed — evaluate presence at step level so env/vars/secrets are available.
    steps:
      - uses: actions/checkout@v4
      - name: Run Lighthouse Action
        # Step-level conditional can reference vars/secrets/env; prefers repo variable, then secret, then workflow env.
        if: ${{ vars.LIGHTHOUSE_URL || secrets.LIGHTHOUSE_URL || env.LIGHTHOUSE_URL }}
        uses: GoogleChrome/lighthouse-action@v3
        with:
          url: ${{ vars.LIGHTHOUSE_URL || secrets.LIGHTHOUSE_URL || env.LIGHTHOUSE_URL || 'https://example.com' }}
          output: html
          output-path: ./lh-report.html
