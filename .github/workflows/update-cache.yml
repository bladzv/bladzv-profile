name: Update GitHub Repos Cache

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run cache updater
        run: node scripts/update-github-cache.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show git status
        run: git status --porcelain --untracked-files=no || true

      - name: Commit cache if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .cache/github_repos.json
          if ! git diff --staged --quiet; then
            git commit -m "chore(cache): update github_repos.json [skip ci]"
            git push origin HEAD:main
          else
            echo "No changes to commit"
          fi
